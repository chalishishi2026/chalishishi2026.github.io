<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>原创剧本馆 - 肆顾门数字文化</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <img src="assets/images/logo.png" alt="肆顾门 logo">
                <span>肆顾门数字文化</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="news.html">行业资讯</a></li>
                <li><a href="team.html">团队风采</a></li>
                <li><a href="works.html" class="active">原创剧本馆</a></li>
                <li><a href="submit.html" class="btn-submit">创作中心</a></li>
            </ul>
            <div class="nav-toggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <!-- 页面标题 -->
    <section class="page-header">
        <div class="container">
            <h1>原创剧本馆</h1>
            <p>原创剧本展示，包含完整文本、精美封面与配乐</p>
        </div>
    </section>

    <!-- 剧本分类筛选 -->
    <section class="works-filter">
        <div class="container">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="drama">广播剧</button>
            <button class="filter-btn" data-filter="audiobook">有声书</button>
            <button class="filter-btn" data-filter="shortplay">短剧</button>
            <button class="filter-btn" data-filter="pia">PIA剧</button>
        </div>
    </section>

    <!-- 剧本卡片展示 -->
    <section class="works-grid-container">
        <div class="container">
            <div class="works-grid" id="works-container">
                <!-- 动态加载剧本列表 -->
                <div class="work-card loading">
                    <div class="work-cover"></div>
                    <div class="work-info">
                        <h3>加载中...</h3>
                        <span class="work-type">--</span>
                        <p class="work-summary">正在加载剧本...</p>
                        <div class="work-actions">
                            <button class="btn-play" disabled>
                                <i class="fas fa-play"></i> 试听
                            </button>
                            <a href="#" class="btn-detail" disabled>
                                <i class="fas fa-book-open"></i> 详情
                            </a>
                        </div>
                    </div>
                </div>
                <div class="work-card loading">
                    <div class="work-cover"></div>
                    <div class="work-info">
                        <h3>加载中...</h3>
                        <span class="work-type">--</span>
                        <p class="work-summary">正在加载剧本...</p>
                        <div class="work-actions">
                            <button class="btn-play" disabled>
                                <i class="fas fa-play"></i> 试听
                            </button>
                            <a href="#" class="btn-detail" disabled>
                                <i class="fas fa-book-open"></i> 详情
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            <!-- 分页 -->
            <div class="pagination" id="works-pagination">
                <button class="page-btn prev" disabled><i class="fas fa-chevron-left"></i></button>
                <div class="page-numbers"></div>
                <button class="page-btn next"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-col">
                    <h3>肆顾门数字文化</h3>
                    <p>专业从事有声内容创作、剧本孵化、配音培训</p>
                </div>
                <div class="footer-col">
                    <h3>快速链接</h3>
                    <ul>
                        <li><a href="index.html">首页</a></li>
                        <li><a href="news.html">行业资讯</a></li>
                        <li><a href="team.html">团队风采</a></li>
                        <li><a href="works.html">原创剧本馆</a></li>
                    </ul>
                </div>
                <div class="footer-col">
                    <h3>创作服务</h3>
                    <ul>
                        <li><a href="submit.html">上传作品</a></li>
                        <li><a href="#">配音制作</a></li>
                        <li><a href="#">剧本创作</a></li>
                    </ul>
                </div>
                <div class="footer-col">
                    <h3>关注我们</h3>
                    <div class="social-links">
                        <a href="#"><i class="fab fa-weixin"></i></a>
                        <a href="#"><i class="fab fa-weibo"></i></a>
                    </div>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 肆顾门数字文化（南通）有限公司</p>
            </div>
        </div>
    </footer>

    <script src="assets/js/main.js"></script>
</body>
</html>
